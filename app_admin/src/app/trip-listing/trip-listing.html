<div class="row mt-3 mb-3">
    <div class="col-6">
        <input
            type="text"
            class="form-control"
            placeholder="Search trips..."
            [(ngModel)]="searchTerm"
            (input)="applyFiltersAndSort()"
        />
    </div>

    <div class="col-6">
        <select
            class="form-select"
            [(ngModel)]="sortOption"
            (change)="applyFiltersAndSort()"
        >
            <option value="">Sort By</option>
            <option value="name">Name (A to Z)</option>
            <option value="priceLow">Price (Low to High)</option>
            <option value="priceHigh">Price (High to Low)</option>
            <option value="length">Trip Length</option>
        </select>
    </div>
</div>

<div class="row">
    <div *ngFor="let trip of filteredTrips" class="col-4">
        <app-trip-card [trip]="trip" class="card-deck mt-2"></app-trip-card>
    </div>
</div>
